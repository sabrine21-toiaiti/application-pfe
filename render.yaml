services:
  - type: web
    name: sebn-ia-service
    env: python
    rootDir: ia-service
    buildCommand: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

  - type: web
    name: sebn-web-app
    env: docker
    rootDir: SebnWeb
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DetectionApi__BaseUrl
        value: https://sebn-ia-service.onrender.com
